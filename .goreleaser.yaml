version: 2
builds:
  - id: resolved
    main: ./cmd/resolved
    binary: resolved
    env:
      - CGO_ENABLED=0
    goos: [linux, darwin]
    goarch: [amd64, arm64]
    ldflags:
      - -s -w -X github.com/noamsto/resolved/internal/cli.version={{.Version}}
archives:
  - # prebuilt binaries for `go install`-free users; the plugin no longer downloads these
    name_template: "resolved_{{ .Os }}_{{ .Arch }}"
    formats: [tar.gz]
checksum:
  name_template: checksums.txt
