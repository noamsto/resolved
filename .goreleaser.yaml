version: 2
builds:
  - id: resolved
    main: ./cmd/resolved
    binary: resolved
    env:
      - CGO_ENABLED=1
    goos: [linux, darwin]
    goarch: [amd64, arm64]
    ldflags:
      - -s -w -X github.com/noamsto/resolved/internal/cli.version={{.Version}}
archives:
  - formats: [tar.gz]
checksum:
  name_template: checksums.txt
